name: Export PDF

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export PDF
        run: npx slidev export --output openclaw-talk.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-talk-pdf
          path: openclaw-talk.pdf
